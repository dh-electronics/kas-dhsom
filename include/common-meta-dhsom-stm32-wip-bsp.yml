header:
  version: 14
  includes:
    - include/common-settings.yml

distro: nodistro

target:
  - core-image-base

repos:
  bitbake:
    url: https://git.openembedded.org/bitbake
    # No layers in this repository
    layers:
      .: disabled

  oecore:
    url: https://git.openembedded.org/openembedded-core
    layers:
      meta:

  meta-mainline-common:
    url: https://source.denx.de/denx/meta-mainline-common.git
    branch: main

  meta-openembedded:
    url: https://git.openembedded.org/meta-openembedded
    layers:
      meta-oe:
      meta-python:

  meta-dhsom-stm32-wip-bsp:
    url: https://github.com/dh-electronics/meta-dhsom-stm32-wip-bsp.git
    branch: stm32mp25xx-initial-bring-up
